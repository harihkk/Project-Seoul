name: ci

# Repository-owned checks that run WITHOUT a Chromium checkout or build.

on:
  push:
    branches: [main, "native/**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      # Action versions are pinned to a major tag; tighten to a full commit SHA
      # when hardening the supply chain further.
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - name: Install (lockfile)
        run: npm ci
      - name: Repository checks (scripts, json, manifest, boundary, neutrality, architecture, syntax, protocol)
        run: npm run check
      - name: Tests (protocol conformance, canvas)
        run: npm test
