<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Project Seoul - Development Harness</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <main class="panel">
      <header class="panel__header">
        <h1 class="panel__title">Seoul Runtime Slice 1</h1>
        <p class="panel__subtitle">Development harness - not the final browser.</p>
      </header>

      <section class="card" aria-labelledby="tab-heading">
        <h2 id="tab-heading" class="card__heading">Active tab</h2>
        <p class="tab__title" id="tab-title">-</p>
        <p class="tab__origin" id="tab-origin">-</p>
      </section>

      <section class="card" aria-labelledby="session-heading">
        <h2 id="session-heading" class="card__heading">Session</h2>
        <p class="state-line">
          State: <span id="state-indicator" class="state state--starting">RESTORING</span>
        </p>
        <div class="button-row">
          <button id="btn-start" type="button">Start session</button>
          <button id="btn-stop" type="button" disabled>Stop session</button>
          <button id="btn-inspect" type="button" disabled>Inspect page</button>
        </div>
        <p id="access-notice" class="warning" hidden></p>
        <p id="stale-warning" class="warning" hidden>
          Session is stale. Start a new session to continue.
        </p>
        <div id="error-box" class="error" hidden>
          <span class="error__code" id="error-code"></span>
          <span class="error__message" id="error-message"></span>
        </div>
      </section>

      <section class="card" aria-labelledby="action-heading">
        <h2 id="action-heading" class="card__heading">Actions</h2>

        <div class="selected" id="selected-box">
          <span class="selected__label">Selected element:</span>
          <span class="selected__value" id="selected-value">none</span>
        </div>

        <div class="button-row">
          <button id="btn-click" type="button" disabled>Click selected</button>
          <button id="btn-scroll-up" type="button" disabled>Scroll up</button>
          <button id="btn-scroll-down" type="button" disabled>Scroll down</button>
        </div>

        <div class="field-row">
          <label class="field-row__label" for="type-input">Type into selected</label>
          <input id="type-input" type="text" placeholder="Text to type" autocomplete="off" />
          <button id="btn-type" type="button" disabled>Type</button>
        </div>

        <div class="field-row">
          <label class="field-row__label" for="nav-input">Navigate (http/https)</label>
          <input id="nav-input" type="url" placeholder="https://example.com" autocomplete="off" />
          <button id="btn-navigate" type="button" disabled>Go</button>
        </div>
      </section>

      <section class="card" aria-labelledby="elements-heading">
        <h2 id="elements-heading" class="card__heading">
          Interactive elements <span id="elements-count" class="muted"></span>
        </h2>
        <ul id="elements-list" class="elements" aria-live="polite"></ul>
      </section>

      <section class="card" aria-labelledby="text-heading">
        <h2 id="text-heading" class="card__heading">
          Visible text <span id="text-count" class="muted"></span>
        </h2>
        <ul id="text-list" class="text-blocks"></ul>
      </section>

      <section class="card" aria-labelledby="timeline-heading">
        <h2 id="timeline-heading" class="card__heading">Event timeline</h2>
        <ol id="timeline-list" class="timeline" aria-live="polite"></ol>
      </section>
    </main>

    <script type="module" src="index.js"></script>
  </body>
</html>
